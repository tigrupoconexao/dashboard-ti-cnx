<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Helpdesk | Grafana Time Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d1b2a;
            --bg-panel: #1b263b;
            --border-panel: #415a77;
            --text-main: #e0e1dd;
            --text-dim: #778da9;
            --blue: #415a77;
            --green: #56a64b;
            --red: #e02f44;
            --orange: #f29527;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
        }

        .grafana-panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-panel);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header::before {
            content: "";
            width: 2px;
            height: 12px;
            background: var(--blue);
        }

        .panel-content { padding: 12px; flex-grow: 1; }

        .stat-panel { border-left: 4px solid var(--blue); }
        .stat-value { font-family: 'Roboto Mono', monospace; font-size: 32px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }

        .g-select {
            background: #1b263b;
            border: 1px solid var(--border-panel);
            color: var(--text-main);
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 2px;
            outline: none;
        }

        header { background: #0d1b2a; border-bottom: 1px solid var(--border-panel); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-panel); }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 mb-6">
        <div class="max-w-[1800px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white p-1 rounded-sm">
                    <img src="logo.png" style="height:30px;" onerror="this.src='https://via.placeholder.com/100x30/FFFFFF/0d1b2a?text=LOGOMARCA'">
                </div>
                <div class="text-[14px] font-bold tracking-tight">TI GRUPO CONEXÃO / <span class="text-[#778da9]">HELPDESK ANALYTICS</span></div>
            </div>
            <div class="text-[10px] font-mono text-right">
                <span class="text-[#778da9]">SINCRONIZAÇÃO: </span>
                <span id="sync-time" class="text-white font-bold">---</span>
            </div>
        </div>
    </header>

    <div class="max-w-[1800px] mx-auto px-4">
        
        <div class="flex flex-wrap gap-2 mb-6 bg-[#1b263b] p-3 border border-[#415a77]">
            <select id="f-sector" class="g-select" onchange="apply()"><option value="All">Setor: Todos</option></select>
            <select id="f-status" class="g-select" onchange="apply()"><option value="All">Status: Todos</option></select>
            <select id="f-type" class="g-select" onchange="apply()"><option value="All">Tipo: Todos</option></select>
            <select id="f-req" class="g-select" onchange="apply()"><option value="All">Solicitação: Todas</option></select>
            <button onclick="reset()" class="g-select border-none bg-[#415a77] hover:bg-[#778da9] font-bold px-4 text-white transition-colors uppercase">Limpar</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="grafana-panel stat-panel">
                <div class="panel-content">
                    <div class="stat-label">Total de Chamados</div>
                    <div id="kpi-total" class="stat-value">0</div>
                </div>
            </div>
            <div class="grafana-panel stat-panel !border-l-[#56a64b]">
                <div class="panel-content">
                    <div class="stat-label">Concluídos / Resolvidos</div>
                    <div id="kpi-resolved" class="stat-value text-[#56a64b]">0</div>
                </div>
            </div>
            <div class="grafana-panel stat-panel !border-l-[#e02f44]">
                <div class="panel-content">
                    <div class="stat-label">Cancelados</div>
                    <div id="kpi-canceled" class="stat-value text-[#e02f44]">0</div>
                </div>
            </div>
            <div class="grafana-panel stat-panel !border-l-[#f29527]">
                <div class="panel-content">
                    <div class="stat-label">Eficiência</div>
                    <div id="kpi-rate" class="stat-value text-[#f29527]">0%</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mb-4">
            <div class="grafana-panel lg:col-span-8">
                <div class="panel-header">Evolução Mensal de Chamados (Time Series)</div>
                <div class="panel-content"><div id="chart-ev"></div></div>
            </div>
            <div class="grafana-panel lg:col-span-4">
                <div class="panel-header">Prioridade</div>
                <div class="panel-content"><div id="chart-prio"></div></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
            <div class="grafana-panel">
                <div class="panel-header">Top 10 Setores Solicitantes</div>
                <div class="panel-content"><div id="chart-sectors"></div></div>
            </div>
            <div class="grafana-panel">
                <div class="panel-header">Top 10 Tipos de Solicitação</div>
                <div class="panel-content"><div id="chart-req"></div></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
            <div class="grafana-panel">
                <div class="panel-header">Heatmap Semanal</div>
                <div class="panel-content"><div id="chart-week"></div></div>
            </div>
            <div class="grafana-panel">
                <div class="panel-header">Heatmap Mensal</div>
                <div class="panel-content"><div id="chart-month"></div></div>
            </div>
        </div>

        <div class="grafana-panel">
            <div class="panel-header">Matriz: Solicitação por Setor</div>
            <div class="panel-content overflow-x-auto"><div id="chart-matrix"></div></div>
        </div>
    </div>

    <script>
        let raw = [];
        let charts = {};
        const COL = { STATUS: 'Status', PRIO: 'Prioridade', CREATED: 'Criado', TYPE: 'Tipo de item', REQ: 'Campo personalizado (Request Type)', SECTOR: 'Campo personalizado (Setor Solicitante)' };

        function clean(s) { 
            if(!s) return "";
            return s.toString().replace(/^\uFEFF/, '').trim()
                    .replace(/Ã¡/g, 'á').replace(/Ã©/g, 'é').replace(/Ã³/g, 'ó').replace(/Ãº/g, 'ú').replace(/Ã§/g, 'ç').replace(/Ã£/g, 'ã').replace(/Ã­/g, 'í');
        }

        function parseDate(s) {
            if(!s) return null;
            let d, m, y, h;
            if(s.includes('/')){ [d,m,y] = s.split(' ')[0].split('/'); h = s.split(' ')[1]?.split(':')[0] || 0; }
            else { [y,m,d] = s.split(' ')[0].split('-'); h = s.split(' ')[1]?.split(':')[0] || 0; }
            return { d: parseInt(d), m: parseInt(m), y: parseInt(y), h: parseInt(h), key: `${m.toString().padStart(2,'0')}/${y.toString().slice(-2)}` };
        }

        window.onload = function() {
            Papa.parse("data.csv", { download: true, header: true, skipEmptyLines: true, encoding: "ISO-8859-1", complete: function(r) {
                raw = r.data.map(row => { let o={}; Object.keys(row).forEach(k => o[clean(k)]=clean(row[k])); return o; });
                init();
            }});
        };

        function init() {
            const getU = (f) => [...new Set(raw.map(d => d[f]))].filter(v => v).sort();
            const fill = (id, l, p) => { let s=document.getElementById(id); l.forEach(v => { let o=document.createElement('option'); o.value=v; o.text=`${p}: ${v}`; s.add(o); }); };
            fill('f-sector', getU(COL.SECTOR), "Setor");
            fill('f-status', getU(COL.STATUS), "Status");
            fill('f-type', getU(COL.TYPE), "Tipo");
            fill('f-req', getU(COL.REQ), "Solicit.");
            document.getElementById('sync-time').innerText = moment().format('DD/MM/YYYY [às] HH:mm:ss');
            apply();
        }

        function apply() {
            const f = raw.filter(d => 
                (document.getElementById('f-sector').value === 'All' || d[COL.SECTOR] === document.getElementById('f-sector').value) &&
                (document.getElementById('f-status').value === 'All' || d[COL.STATUS] === document.getElementById('f-status').value) &&
                (document.getElementById('f-type').value === 'All' || d[COL.TYPE] === document.getElementById('f-type').value) &&
                (document.getElementById('f-req').value === 'All' || d[COL.REQ] === document.getElementById('f-req').value)
            );
            render(f);
        }

        function reset() { document.querySelectorAll('.g-select').forEach(s => s.value='All'); apply(); }

        function render(data) {
            const isF = (s) => ["Resolvido", "Concluído", "Concluido"].includes(s);
            const total = data.length;
            const fin = data.filter(d => isF(d[COL.STATUS])).length;
            const can = data.filter(d => d[COL.STATUS] === "Cancelado").length;
            const rate = (total - can) > 0 ? ((fin / (total - can)) * 100).toFixed(1) : 0;

            document.getElementById('kpi-total').innerText = total;
            document.getElementById('kpi-resolved').innerText = fin;
            document.getElementById('kpi-canceled').innerText = can;
            document.getElementById('kpi-rate').innerText = rate + "%";

            // Evolução Estilo Grafana (Área Suave)
            const months = {"01/26": "Jan", "02/26": "Fev", "03/26": "Mar"};
            let ev = {"01/26":0, "02/26":0, "03/26":0};
            data.forEach(d => { let p=parseDate(d[COL.CREATED]); if(p && ev.hasOwnProperty(p.key)) ev[p.key]++; });
            
            draw('chart-ev', {
                series: [{ name: 'Abertos', data: Object.values(ev) }],
                chart: { type: 'area', height: 280, sparkline: { enabled: false }, toolbar: { show: false } },
                stroke: { curve: 'smooth', width: 2 },
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.1 } },
                colors: ['#778da9'],
                xaxis: { categories: Object.keys(ev).map(k => months[k]), axisBorder: { show: false } },
                yaxis: { show: true },
                grid: { borderColor: '#1b263b', strokeDashArray: 4 }
            });

            const prio = count(data, COL.PRIO);
            draw('chart-prio', { series:prio.v, labels:prio.l, chart:{type:'donut', height:280}, stroke:{show:false}, colors:['#415a77','#56a64b','#f29527','#e02f44'], legend:{position:'bottom', labels:{colors:'#778da9'}} });

            const sec = count(data, COL.SECTOR, 10);
            draw('chart-sectors', bar(sec.v, sec.l, '#56a64b', true));

            const req = count(data, COL.REQ, 10);
            draw('chart-req', bar(req.v, req.l, '#415a77', true));

            renderHeatmaps(data);
        }

        function count(data, f, l) {
            let c = {}; data.forEach(d => { let v=d[f]||"N/A"; c[v]=(c[v]||0)+1; });
            let e = Object.entries(c).sort((a,b)=>b[1]-a[1]); if(l) e=e.slice(0,l);
            return { l:e.map(i=>i[0]), v:e.map(i=>i[1]) };
        }

        function bar(v, l, c, h) {
            return { series:[{name:'Total', data:v}], chart:{type:'bar', height:250, toolbar:{show:false}}, colors:[c], plotOptions:{bar:{horizontal:h, borderRadius:2}}, xaxis:{categories:l}, grid:{borderColor:'#1b263b'} };
        }

        function renderHeatmaps(data) {
            const hColors = {
                ranges: [
                    { from: 0, to: 0, color: '#1b263b' },
                    { from: 1, to: 3, color: '#415a77' },
                    { from: 4, to: 100, color: '#778da9' }
                ]
            };

            let wk = ["Seg","Ter","Qua","Qui","Sex","Sab","Dom"].map(d=>({name:d, data:Array(24).fill(0).map((_,i)=>({x:i+'h', y:0}))}));
            data.forEach(d => {
                let p=parseDate(d[COL.CREATED]);
                if(p) { let dObj=new Date(p.y,p.m-1,p.d); let idx=(dObj.getDay()+6)%7; if(wk[idx]) wk[idx].data[p.h].y++; }
            });
            draw('chart-week', { series:wk.reverse(), chart:{type:'heatmap', height:250}, plotOptions:{heatmap:{colorScale:hColors}}, dataLabels:{enabled:false} });

            let mth = ["Jan","Fev","Mar"].map(m=>({name:m, data:Array(31).fill(0).map((_,i)=>({x:(i+1).toString(), y:0}))}));
            data.forEach(d => { let p=parseDate(d[COL.CREATED]); if(p && p.m<=3) mth[p.m-1].data[p.d-1].y++; });
            draw('chart-month', { series:mth.reverse(), chart:{type:'heatmap', height:250}, plotOptions:{heatmap:{colorScale:hColors}}, dataLabels:{enabled:false} });

            const s = count(data, COL.SECTOR, 8).l; const r = count(data, COL.REQ, 10).l;
            draw('chart-matrix', { series:r.map(req=>({name:req, data:s.map(sec=>({x:sec, y:data.filter(d=>d[COL.REQ]===req && d[COL.SECTOR]===sec).length}))})), chart:{type:'heatmap', height:400}, plotOptions:{heatmap:{colorScale:hColors}}, dataLabels:{enabled:true} });
        }

        function draw(id, opts) {
            opts.chart.background = 'transparent'; opts.chart.foreColor = '#778da9';
            if(charts[id]) charts[id].updateOptions(opts);
            else { charts[id] = new ApexCharts(document.querySelector("#"+id), opts); charts[id].render(); }
        }
    </script>
</body>
</html>
