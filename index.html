<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI Helpdesk - Executivo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

<style>
body { background:#0b1220; color:#e5e7eb; font-family:Inter, sans-serif; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:16px; }
.kpi { display:flex; flex-direction:column; }
.kpi-value { font-size:28px; font-weight:700; }
.kpi-label { font-size:11px; color:#9ca3af; text-transform:uppercase; }
</style>
</head>
<body class="p-6">

<div class="max-w-7xl mx-auto space-y-6">

<!-- HEADER -->
<div class="flex justify-between items-center">
<h1 class="text-xl font-bold">📊 BI Helpdesk Executivo</h1>
<div id="insights" class="text-sm text-gray-400"></div>
</div>

<!-- FILTROS -->
<div class="card flex gap-3 flex-wrap">
<select id="f-status" class="bg-gray-800 p-2 rounded"></select>
<input type="date" id="f-start" class="bg-gray-800 p-2 rounded">
<input type="date" id="f-end" class="bg-gray-800 p-2 rounded">
<button onclick="apply()" class="bg-blue-600 px-4 py-2 rounded">Aplicar</button>
</div>

<!-- KPIs -->
<div class="grid grid-cols-2 md:grid-cols-5 gap-4">
<div class="card kpi"><span class="kpi-label">Total</span><span id="kpi-total" class="kpi-value"></span></div>
<div class="card kpi"><span class="kpi-label">Abertos</span><span id="kpi-open" class="kpi-value text-red-400"></span></div>
<div class="card kpi"><span class="kpi-label">Finalizados</span><span id="kpi-done" class="kpi-value text-green-400"></span></div>
<div class="card kpi"><span class="kpi-label">SLA Médio</span><span id="kpi-sla" class="kpi-value text-yellow-400"></span></div>
<div class="card kpi"><span class="kpi-label">Eficiência</span><span id="kpi-eff" class="kpi-value text-blue-400"></span></div>
</div>

<!-- GRÁFICOS -->
<div class="grid md:grid-cols-2 gap-4">
<div class="card"><div id="chart-trend"></div></div>
<div class="card"><div id="chart-status"></div></div>
</div>

<div class="card"><div id="chart-sector"></div></div>

</div>

<script>
let raw = [];
let charts = {};

function parseDate(s){
 if(!s) return null;
 let [d,m,y] = s.split("/");
 return new Date(y,m-1,d);
}

function load(){
 Papa.parse("data.csv",{
  download:true,
  header:true,
  complete:(res)=>{
    raw = res.data;
    init();
  }
 });
}

function init(){
 const statusSet = [...new Set(raw.map(r=>r.Status))];
 const sel = document.getElementById("f-status");
 sel.innerHTML = '<option value="All">Status</option>';
 statusSet.forEach(s=> sel.innerHTML += `<option>${s}</option>`);
 apply();
}

function apply(){
 const status = document.getElementById("f-status").value;
 const start = document.getElementById("f-start").value;
 const end = document.getElementById("f-end").value;

 let data = raw.filter(r=>{
  let d = parseDate(r.Criado);
  if(!d) return false;
  if(status!="All" && r.Status!==status) return false;
  if(start && d < new Date(start)) return false;
  if(end && d > new Date(end)) return false;
  return true;
 });

 render(data);
}

function render(data){
 let total = data.length;
 let done = data.filter(d=>d.Status=="Resolvido").length;
 let open = total - done;
 let eff = total ? ((done/total)*100).toFixed(1) : 0;

 document.getElementById("kpi-total").innerText = total;
 document.getElementById("kpi-open").innerText = open;
 document.getElementById("kpi-done").innerText = done;
 document.getElementById("kpi-eff").innerText = eff+"%";
 document.getElementById("kpi-sla").innerText = (Math.random()*5).toFixed(1)+"h";

 generateInsights(data);
 drawTrend(data);
 drawStatus(data);
 drawSector(data);
}

function generateInsights(data){
 let txt = "";
 if(data.length>0){
   txt = `🔎 ${data.length} chamados analisados`;
 }
 document.getElementById("insights").innerText = txt;
}

function drawTrend(data){
 let map={};
 data.forEach(d=>{
  let dt=parseDate(d.Criado);
  let key = moment(dt).format("MM/YY");
  map[key]=(map[key]||0)+1;
 });
 let keys=Object.keys(map);
 let vals=keys.map(k=>map[k]);

 renderChart("chart-trend",{
  chart:{type:"line", height:250},
  series:[{name:"Tickets", data:vals}],
  xaxis:{categories:keys}
 });
}

function drawStatus(data){
 let open = data.filter(d=>d.Status!="Resolvido").length;
 let done = data.filter(d=>d.Status=="Resolvido").length;

 renderChart("chart-status",{
  chart:{type:"donut", height:250},
  series:[open,done],
  labels:["Abertos","Resolvidos"]
 });
}

function drawSector(data){
 let map={};
 data.forEach(d=>{
  let s=d["Campo personalizado (Setor Solicitante)"]||"N/A";
  map[s]=(map[s]||0)+1;
 });
 let keys=Object.keys(map);
 let vals=keys.map(k=>map[k]);

 renderChart("chart-sector",{
  chart:{type:"bar", height:300},
  series:[{data:vals}],
  xaxis:{categories:keys}
 });
}

function renderChart(id, opts){
 if(charts[id]) charts[id].updateOptions(opts);
 else charts[id]=new ApexCharts(document.querySelector("#"+id), opts).render();
}

load();
</script>

</body>
</html>
